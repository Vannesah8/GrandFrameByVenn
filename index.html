<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrandFrame by Venn</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0e0e0e;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    line-height: 1.6;
}

header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    background: linear-gradient(to bottom, #000000, #111111);
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    letter-spacing: 3px;
}

header p {
    margin-top: 20px;
    font-size: 1.2rem;
    font-weight: 300;
    opacity: 0.8;
}

.cta {
    margin-top: 40px;
}

.cta a {
    text-decoration: none;
    color: #000;
    background: #ffffff;
    padding: 14px 40px;
    border-radius: 30px;
    font-weight: 600;
    transition: 0.3s ease;
}

.cta a:hover {
    background: #d4d4d4;
}

.section {
    padding: 100px 8%;
}

.section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    margin-bottom: 60px;
    text-align: center;
}

.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 40px;
}

.video-card {
    background: #181818;
    padding: 20px;
    border-radius: 20px;
    transition: 0.3s ease;
}

.video-card:hover {
    transform: translateY(-10px);
}

.video-card iframe {
    width: 100%;
    height: 300px;
    border-radius: 15px;
}

.video-card h3 {
    margin-top: 15px;
    font-weight: 400;
    font-size: 1.1rem;
}

footer {
    text-align: center;
    padding: 40px;
    background: #0a0a0a;
    font-size: 0.9rem;
    opacity: 0.6;
}

@media(max-width: 768px) {
    header h1 {
        font-size: 2.5rem;
    }

    .video-card iframe {
        height: 220px;
    }
}
</style>
</head>

<body>

<header>
    <h1>GrandFrame</h1>
    <p>Cinematic Storytelling • Visual Excellence • Crafted Moments</p>
    <div class="cta">
        <a href="#portfolio">View Our Work</a>
    </div>
</header>

<section class="section" id="portfolio">
    <h2>Featured Work</h2>

    <div class="video-grid">

        <div class="video-card">
            <iframe src="https://gumlet.tv/embed/692eb92cbfccd936952360a1/" 
            frameborder="0" allowfullscreen></iframe>
            <h3>Corporate Interview Production</h3>
        </div>

        <div class="video-card">
            <iframe src="https://gumlet.tv/embed/692eb76fbfccd9369523389a/" 
            frameborder="0" allowfullscreen></iframe>
            <h3>Brand Story Film</h3>
        </div>

        <div class="video-card">
            <iframe src="https://gumlet.tv/embed/692ebb9ebfccd936952399a4/" 
            frameborder="0" allowfullscreen></iframe>
            <h3>Luxury Event Coverage</h3>
        </div>

        <div class="video-card">
            <iframe src="https://gumlet.tv/embed/692ebf4ee87c452ab8915136/" 
            frameborder="0" allowfullscreen></iframe>
            <h3>Creative Commercial Shoot</h3>
        </div>

        <div class="video-card">
            <iframe src="https://gumlet.tv/embed/692ec666cd7535d7c0d17f0d/" 
            frameborder="0" allowfullscreen></iframe>
            <h3>Full-Day Documentary Coverage</h3>
        </div>

    </div>
</section>

<footer>
    © 2026 GrandFrame by Venn. All Rights Reserved.
</footer>

</body>
</html>
