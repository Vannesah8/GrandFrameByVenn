<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrandFrame by Venn</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0c0c0c;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
}

header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(to bottom, #000000, #111111);
    padding: 20px;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    letter-spacing: 3px;
}

header p {
    margin-top: 20px;
    font-size: 1.2rem;
    opacity: 0.7;
}

.cta {
    margin-top: 40px;
}

.cta a {
    text-decoration: none;
    background: white;
    color: black;
    padding: 14px 40px;
    border-radius: 30px;
    font-weight: 600;
    transition: 0.3s ease;
}

.cta a:hover {
    background: #dcdcdc;
}

.section {
    padding: 100px 8%;
}

.section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    text-align: center;
    margin-bottom: 60px;
}

.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 40px;
}

.video-card {
    background: #161616;
    padding: 20px;
    border-radius: 20px;
    transition: 0.3s ease;
}

.video-card:hover {
    transform: translateY(-8px);
}

.video-wrapper {
    position: relative;
    padding-top: 56.25%;
    border-radius: 15px;
    overflow: hidden;
}

.video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

.video-card h3 {
    margin-top: 15px;
    font-weight: 400;
}

footer {
    text-align: center;
    padding: 40px;
    background: #080808;
    font-size: 0.9rem;
    opacity: 0.6;
}

@media(max-width:768px){
    header h1 {
        font-size: 2.5rem;
    }
}
</style>
</head>

<body>

<header>
    <h1>GrandFrame</h1>
    <p>Cinematic Storytelling • Visual Excellence • Crafted Moments</p>
    <div class="cta">
        <a href="#portfolio">View Our Work</a>
    </div>
</header>

<section class="section" id="portfolio">
    <h2>Featured Work</h2>

    <div class="video-grid">

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://play.gumlet.io/embed/692eb92cbfccd936952360a1" allowfullscreen></iframe>
            </div>
            <h3>Corporate Interview Production</h3>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://play.gumlet.io/embed/692eb76fbfccd9369523389a" allowfullscreen></iframe>
            </div>
            <h3>Brand Story Film</h3>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://play.gumlet.io/embed/692ebb9ebfccd936952399a4" allowfullscreen></iframe>
            </div>
            <h3>Luxury Event Coverage</h3>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://play.gumlet.io/embed/692ebf4ee87c452ab8915136" allowfullscreen></iframe>
            </div>
            <h3>Creative Commercial Shoot</h3>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://play.gumlet.io/embed/692ec666cd7535d7c0d17f0d" allowfullscreen></iframe>
            </div>
            <h3>Full-Day Documentary Coverage</h3>
        </div>

    </div>
</section>

<footer>
    © 2026 GrandFrame by Venn. All Rights Reserved.
</footer>

</body>
</html>
